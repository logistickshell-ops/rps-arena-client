<!-- ... ВСЁ СОДЕРЖИМОЕ HEAD ОСТАЁТСЯ ПРЕЖНИМ ... -->

<body>
    <!-- Модальное окно аутентификации -->
    <div id="auth-modal" class="auth-modal" style="display: flex;">
        <div class="auth-content">
            <h2 id="auth-title">Вход</h2>
            <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" class="auth-input" placeholder="Email" required>
                <input type="password" id="auth-password" class="auth-input" placeholder="Пароль" required>
                <!-- УБРАЛИ 'required' с этих полей -->
                <input type="password" id="auth-confirm-password" class="auth-input" placeholder="Подтвердите пароль" style="display: none;">
                <input type="text" id="auth-player-name" class="auth-input" placeholder="Имя игрока" style="display: none;">
                <button type="submit" class="auth-btn" id="auth-submit-btn">Войти</button>
            </form>
            <div id="auth-message" class="auth-error"></div>
            <div id="auth-success-message" class="auth-success"></div>
            <div class="auth-toggle" id="auth-toggle">Ещё не зарегистрированы? Зарегистрироваться</div>
        </div>
    </div>

    <!-- ОСТАЛЬНОЕ СОДЕРЖИМОЕ BODY ОСТАЁТСЯ ПРЕЖНИМ ... -->

    <script>
        // ========== ВСЁ СОДЕРЖИМОЕ JAVASCRIPT (DataManager, AuthManager, etc.) ОСТАЁТСЯ ПРЕЖНИМ ==========
        // ... (Вставь сюда весь предыдущий JS код, включая AuthManager и DataManager) ...

        // ========== ОБНОВЛЁННЫЙ ОБРАБОТЧИК АУТЕНТИФИКАЦИИ ==========
        document.addEventListener('DOMContentLoaded', () => {
            // ... (остальные инициализации, если есть) ...

            const authModal = document.getElementById('auth-modal');
            const mainContainer = document.getElementById('main-container');
            const authForm = document.getElementById('auth-form');
            const authTitle = document.getElementById('auth-title');
            const authSubmitBtn = document.getElementById('auth-submit-btn');
            const authToggle = document.getElementById('auth-toggle');
            const authEmailInput = document.getElementById('auth-email');
            const authPasswordInput = document.getElementById('auth-password');
            const authConfirmPasswordInput = document.getElementById('auth-confirm-password');
            const authPlayerNameInput = document.getElementById('auth-player-name');
            const authMessage = document.getElementById('auth-message');
            const authSuccessMessage = document.getElementById('auth-success-message');
            const logoutBtn = document.getElementById('logout-btn'); // Убедись, что кнопка "Выйти" есть

            let isLoginMode = true;

            // Проверяем, авторизован ли пользователь при загрузке
            if (AuthManager.isLoggedIn()) {
                authModal.style.display = 'none';
                mainContainer.style.display = 'block';
                DataManager.loadUserDataFromServer(); // Загружаем данные с сервера
                // Инициализируем менеджеры
                // window.warehouse = new CardWarehouse();
                // window.collectionManager = new CollectionManager();
                // window.battleManager = new BattleManager();
                // window.dailyQuestsManager = new DailyQuestsManager();
                // window.profileManager = new ProfileManager();
                // window.leaderboardManager = new LeaderboardManager();
                // Настройка навигации (если нужно)
                // ... (код навигации) ...
            } else {
                authModal.style.display = 'flex';
                mainContainer.style.display = 'none';
            }

            // Обработчик переключения между формами
            authToggle.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    authTitle.textContent = 'Вход';
                    authSubmitBtn.textContent = 'Войти';
                    // Скрываем поля регистрации
                    authConfirmPasswordInput.style.display = 'none';
                    authPlayerNameInput.style.display = 'none';
                    // УБИРАЕМ 'required'
                    authConfirmPasswordInput.removeAttribute('required');
                    authPlayerNameInput.removeAttribute('required');
                } else {
                    authTitle.textContent = 'Регистрация';
                    authSubmitBtn.textContent = 'Зарегистрироваться';
                    // Показываем поля регистрации
                    authConfirmPasswordInput.style.display = 'block';
                    authPlayerNameInput.style.display = 'block';
                    // ДОБАВЛЯЕМ 'required'
                    authConfirmPasswordInput.setAttribute('required', '');
                    authPlayerNameInput.setAttribute('required', '');
                }
                authMessage.textContent = '';
                authSuccessMessage.textContent = '';
            });

            // Обработчик отправки формы
            authForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // Предотвращаем стандартную отправку формы
                authMessage.textContent = '';
                authSuccessMessage.textContent = '';

                const email = authEmailInput.value.trim();
                const password = authPasswordInput.value;
                // ПОЛУЧАЕМ ЗНАЧЕНИЯ ТОЛЬКО ЕСЛИ ПОЛЯ ВИДИМЫ И ОБЯЗАТЕЛЬНЫ
                const confirmPassword = isLoginMode ? undefined : authConfirmPasswordInput.value;
                const playerName = isLoginMode ? undefined : authPlayerNameInput.value.trim();

                // Проверки на клиенте
                if (!isLoginMode) {
                    if (password !== confirmPassword) {
                        authMessage.textContent = 'Пароли не совпадают';
                        return; // Прерываем выполнение, если пароли не совпадают
                    }
                    if (!playerName) {
                        authMessage.textContent = 'Введите имя игрока';
                        return; // Прерываем выполнение, если имя не введено
                    }
                }

                let result;
                if (isLoginMode) {
                    result = await AuthManager.login(email, password);
                } else {
                    result = await AuthManager.register(email, password, playerName); // Передаём имя
                }

                if (result.success) {
                    // --- ВАЖНО: Обновляем локальные данные ПОСЛЕ успешной аутентификации ---
                    DataManager.updateUserDataLocally(result.user); // <-- Добавлено

                    authSuccessMessage.textContent = result.message;
                    setTimeout(() => {
                        authModal.style.display = 'none';
                        mainContainer.style.display = 'block';
                        // Загружаем данные с сервера (опционально, если register/login возвращают всё)
                        // DataManager.loadUserDataFromServer(); // <- Закомментировано, так как updateUserDataLocally уже обновило
                        // Инициализируем менеджеры игры
                        window.warehouse = new CardWarehouse();
                        window.collectionManager = new CollectionManager();
                        window.battleManager = new BattleManager();
                        window.dailyQuestsManager = new DailyQuestsManager();
                        window.profileManager = new ProfileManager();
                        window.leaderboardManager = new LeaderboardManager();

                        // Настройка навигации
                        const navTabs = document.querySelectorAll('.nav-tab');
                        const sections = document.querySelectorAll('.section');
                        navTabs.forEach(tab => {
                            tab.addEventListener('click', () => {
                                const targetSection = tab.getAttribute('data-section');
                                navTabs.forEach(t => t.classList.remove('active'));
                                tab.classList.add('active');
                                sections.forEach(section => {
                                    section.classList.remove('active');
                                    if (section.id === `${targetSection}-section`) {
                                        section.classList.add('active');
                                        // Обновление данных при переходе
                                        if (targetSection === 'collection' && typeof collectionManager !== 'undefined') collectionManager.renderCollection();
                                        else if (targetSection === 'battle' && typeof battleManager !== 'undefined') battleManager.updateBattleDeck();
                                        else if (targetSection === 'daily-quests' && typeof dailyQuestsManager !== 'undefined') dailyQuestsManager.renderQuests();
                                        else if (targetSection === 'profile' && typeof profileManager !== 'undefined') profileManager.updateProfile();
                                        else if (targetSection === 'leaderboard' && typeof leaderboardManager !== 'undefined') {
                                            leaderboardManager.renderLeaderboard();
                                            leaderboardManager.renderAchievements();
                                        }
                                    }
                                });
                            });
                        });

                        // Обновляем UI с использованием локальных данных
                        document.getElementById('user-balance').textContent = DataManager.getUserBalance();
                        document.getElementById('user-level').textContent = DataManager.getUserLevel();
                        document.getElementById('profile-name').textContent = DataManager.getPlayerName();

                    }, 1500);
                } else {
                    authMessage.textContent = result.message; // Показываем сообщение об ошибке
                }
            });

            // Обработчик кнопки "Выйти"
            if (logoutBtn) { // Проверяем, существует ли кнопка
                logoutBtn.addEventListener('click', () => {
                    AuthManager.logout();
                });
            }
        });
    </script>
</body>
</html>
