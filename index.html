<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Arena - Регистрация/Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0c0c1d, #1a1a3e);
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-modal {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-input {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1em;
        }
        .auth-btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        .auth-toggle {
            margin-top: 10px;
            text-align: center;
            color: #00d4ff;
            cursor: pointer;
            text-decoration: underline;
        }
        .auth-error {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
        }
        .auth-success {
            color: #00ff88;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Модальное окно аутентификации -->
    <div id="auth-modal" class="auth-modal" style="display: flex;">
        <div class="auth-content">
            <h2 id="auth-title">Вход</h2>
            <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" class="auth-input" placeholder="Email" required>
                <input type="password" id="auth-password" class="auth-input" placeholder="Пароль" required>
                <input type="password" id="auth-confirm-password" class="auth-input" placeholder="Подтвердите пароль" style="display: none;" required>
                <input type="text" id="auth-player-name" class="auth-input" placeholder="Имя игрока" style="display: none;" required>
                <button type="submit" class="auth-btn" id="auth-submit-btn">Войти</button>
            </form>
            <div id="auth-message" class="auth-error"></div>
            <div id="auth-success-message" class="auth-success"></div>
            <div class="auth-toggle" id="auth-toggle">Ещё не зарегистрированы? Зарегистрироваться</div>
        </div>
    </div>

    <script>
        // ========== СИСТЕМА АУТЕНТИФИКАЦИИ ==========
        class AuthManager {
            static isLoggedIn() {
                return !!localStorage.getItem('authToken');
            }

            static getAuthToken() {
                return localStorage.getItem('authToken');
            }

            static setAuthToken(token) {
                localStorage.setItem('authToken', token);
            }

            static clearAuthToken() {
                localStorage.removeItem('authToken');
            }

            static async register(email, password, playerName) {
                // Получаем значение из поля подтверждения пароля
                const confirmPassword = document.getElementById('auth-confirm-password').value;

                try {
                    const response = await fetch('https://rps-arena-server.onrender.com/api/auth/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        // Теперь отправляем все четыре поля:
                        body: JSON.stringify({ email, password, playerName, confirmPassword }), // <-- Добавлен playerName и confirmPassword
                    });

                    const data = await response.json();
                    if (response.ok) {
                        this.setAuthToken(data.token);
                        DataManager.updateUserDataLocally(data.user);
                        return { success: true, message: data.message };
                    } else {
                        return { success: false, message: data.error || 'Ошибка регистрации' };
                    }
                } catch (error) {
                    console.error('Ошибка регистрации:', error);
                    return { success: false, message: 'Ошибка подключения к серверу' };
                }
            }

            static async login(email, password) {
                try {
                    const response = await fetch('https://rps-arena-server.onrender.com/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ email, password }),
                    });

                    const data = await response.json();
                    if (response.ok) {
                        this.setAuthToken(data.token);
                        DataManager.updateUserDataLocally(data.user);
                        return { success: true, message: data.message };
                    } else {
                        return { success: false, message: data.error || 'Ошибка входа' };
                    }
                } catch (error) {
                    console.error('Ошибка входа:', error);
                    return { success: false, message: 'Ошибка подключения к серверу' };
                }
            }

            static async logout() {
                const token = this.getAuthToken();
                if (token) {
                    try {
                        // Попробовать отправить запрос logout на сервер (если эндпоинт реализован)
                        await fetch('https://rps-arena-server.onrender.com/api/auth/logout', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                    } catch (error) {
                        console.warn('Logout request failed:', error);
                        // Даже если запрос не удался, всё равно удаляем токен
                    }
                }
                this.clearAuthToken();
                DataManager.clearLocalData(); // Очищаем локальные данные
                window.location.reload(); // Перезагружаем страницу, чтобы показать форму входа
            }
        }

        // ========== СИСТЕМА ХРАНЕНИЯ ДАННЫХ (Для аутентификации) ==========
        class DataManager {
            static initialize() {
                // Инициализация не требуется, так как данные приходят с сервера после аутентификации
            }

            static updateUserDataLocally(userData) {
                localStorage.setItem('userBalance', userData.balance.toString());
                localStorage.setItem('userLevel', userData.level.toString());
                localStorage.setItem('nftCollection', JSON.stringify(userData.inventory));
                localStorage.setItem('battleDeck', JSON.stringify(userData.deck));
                localStorage.setItem('playerStats', JSON.stringify({
                    totalWins: userData.stats?.totalWins || 0,
                    totalLosses: userData.stats?.totalLosses || 0,
                    currentStreak: userData.stats?.currentStreak || 0,
                    bestStreak: userData.stats?.bestStreak || 0,
                    totalBattles: userData.stats?.totalBattles || 0
                }));
                localStorage.setItem('achievements', JSON.stringify(userData.achievements || {}));
                localStorage.setItem('dailyQuests', JSON.stringify(userData.quests || []));
                // Обновляем имя игрока
                localStorage.setItem('playerName', userData.playerName || 'Игрок');
            }

            static clearLocalData() {
                localStorage.removeItem('nftCollection');
                localStorage.removeItem('battleDeck');
                localStorage.removeItem('userBalance');
                localStorage.removeItem('userLevel');
                localStorage.removeItem('playerStats');
                localStorage.removeItem('achievements');
                localStorage.removeItem('dailyQuests');
                localStorage.removeItem('playerName'); // Очищаем имя игрока
            }

            static async loadUserDataFromServer() {
                const token = AuthManager.getAuthToken();
                if (!token) return;

                try {
                    const response = await fetch('https://rps-arena-server.onrender.com/api/user/profile', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const userData = await response.json();
                        this.updateUserDataLocally(userData);
                        // Обновляем интерфейс
                        document.getElementById('user-balance').textContent = userData.balance;
                        document.getElementById('user-level').textContent = userData.level;
                        document.getElementById('profile-name').textContent = userData.playerName || 'Игрок';
                        // Перезагружаем компоненты, которые зависят от данных
                        if (typeof warehouse !== 'undefined') warehouse.renderCards();
                        if (typeof collectionManager !== 'undefined') collectionManager.renderCollection();
                        if (typeof profileManager !== 'undefined') profileManager.updateProfile();
                        if (typeof leaderboardManager !== 'undefined') leaderboardManager.renderLeaderboard();
                        if (typeof dailyQuestsManager !== 'undefined') dailyQuestsManager.renderQuests();
                    } else {
                        console.error('Ошибка загрузки профиля:', response.status);
                        // Возможно, токен истёк, нужно разлогинить
                        AuthManager.logout();
                    }
                } catch (error) {
                    console.error('Ошибка загрузки профиля:', error);
                    // Опционально: разлогинить при сетевой ошибке
                    // AuthManager.logout();
                }
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ АУТЕНТИФИКАЦИИ ==========
        document.addEventListener('DOMContentLoaded', () => {
            const authModal = document.getElementById('auth-modal');
            const authForm = document.getElementById('auth-form');
            const authTitle = document.getElementById('auth-title');
            const authSubmitBtn = document.getElementById('auth-submit-btn');
            const authToggle = document.getElementById('auth-toggle');
            const authEmailInput = document.getElementById('auth-email');
            const authPasswordInput = document.getElementById('auth-password');
            const authConfirmPasswordInput = document.getElementById('auth-confirm-password');
            const authPlayerNameInput = document.getElementById('auth-player-name');
            const authMessage = document.getElementById('auth-message');
            const authSuccessMessage = document.getElementById('auth-success-message');
            const logoutBtn = document.getElementById('logout-btn');

            let isLoginMode = true;

            // Проверяем, авторизован ли пользователь
            if (AuthManager.isLoggedIn()) {
                authModal.style.display = 'none';
                // Здесь можно показать основной интерфейс игры
                document.body.innerHTML = '<div style="text-align: center; padding: 50px;"><h1>Добро пожаловать!</h1><p>Вы вошли в игру.</p><button id="logout-btn" style="padding: 10px 20px; background: #ff6b6b; border: none; border-radius: 5px; cursor: pointer;">Выйти</button></div>';
                document.getElementById('logout-btn').addEventListener('click', () => {
                    AuthManager.logout();
                });
                DataManager.loadUserDataFromServer(); // Загружаем данные с сервера
            } else {
                authModal.style.display = 'flex';
            }

            // Обработчик переключения между формами
            authToggle.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    authTitle.textContent = 'Вход';
                    authSubmitBtn.textContent = 'Войти';
                    authConfirmPasswordInput.style.display = 'none';
                    authPlayerNameInput.style.display = 'none';
                } else {
                    authTitle.textContent = 'Регистрация';
                    authSubmitBtn.textContent = 'Зарегистрироваться';
                    authConfirmPasswordInput.style.display = 'block';
                    authPlayerNameInput.style.display = 'block';
                }
                authMessage.textContent = '';
                authSuccessMessage.textContent = '';
            });

            // Обработчик отправки формы
            authForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                authMessage.textContent = '';
                authSuccessMessage.textContent = '';

                const email = authEmailInput.value.trim();
                const password = authPasswordInput.value;
                const confirmPassword = authConfirmPasswordInput.value;
                const playerName = authPlayerNameInput.value.trim(); // Получаем имя игрока

                if (!isLoginMode && password !== confirmPassword) {
                    authMessage.textContent = 'Пароли не совпадают';
                    return;
                }

                if (!isLoginMode && !playerName) {
                    authMessage.textContent = 'Введите имя игрока';
                    return;
                }

                let result;
                if (isLoginMode) {
                    result = await AuthManager.login(email, password);
                } else {
                    result = await AuthManager.register(email, password, playerName); // Передаём имя игрока
                }

                if (result.success) {
                    authSuccessMessage.textContent = result.message;
                    setTimeout(() => {
                        authModal.style.display = 'none';
                        // Здесь можно показать основной интерфейс игры
                        document.body.innerHTML = '<div style="text-align: center; padding: 50px;"><h1>Добро пожаловать!</h1><p>Вы успешно вошли в игру.</p><button id="logout-btn" style="padding: 10px 20px; background: #ff6b6b; border: none; border-radius: 5px; cursor: pointer;">Выйти</button></div>';
                        document.getElementById('logout-btn').addEventListener('click', () => {
                            AuthManager.logout();
                        });
                        DataManager.loadUserDataFromServer(); // Загружаем данные с сервера
                    }, 1500);
                } else {
                    authMessage.textContent = result.message;
                }
            });
        });
    </script>
</body>
</html>
