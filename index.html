<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Arena - Регистрация/Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0c0c1d, #1a1a3e);
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-modal {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-input {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1em;
        }
        .auth-btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        .auth-toggle {
            margin-top: 10px;
            text-align: center;
            color: #00d4ff;
            cursor: pointer;
            text-decoration: underline;
        }
        .auth-error {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
        }
        .auth-success {
            color: #00ff88;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Модальное окно аутентификации -->
    <div id="auth-modal" class="auth-modal" style="display: flex;">
        <div class="auth-content">
            <h2 id="auth-title">Вход</h2>
            <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" class="auth-input" placeholder="Email" required>
                <input type="password" id="auth-password" class="auth-input" placeholder="Пароль" required>
                <input type="password" id="auth-confirm-password" class="auth-input" placeholder="Подтвердите пароль" style="display: none;" required>
                <input type="text" id="auth-player-name" class="auth-input" placeholder="Имя игрока" style="display: none;" required>
                <button type="submit" class="auth-btn" id="auth-submit-btn">Войти</button>
            </form>
            <div id="auth-message" class="auth-error"></div>
            <div id="auth-success-message" class="auth-success"></div>
            <div class="auth-toggle" id="auth-toggle">Ещё не зарегистрированы? Зарегистрироваться</div>
        </div>
    </div>

    <script>
        // ========== СИСТЕМА АУТЕНТИФИКАЦИИ (ИСПРАВЛЕНО) ==========
        class AuthManager {
            static isLoggedIn() {
                return !!localStorage.getItem('authToken');
            }

            static getAuthToken() {
                return localStorage.getItem('authToken');
            }

            static setAuthToken(token) {
                localStorage.setItem('authToken', token);
            }

            static clearAuthToken() {
                localStorage.removeItem('authToken');
            }

            static async register(email, password, playerName) {
                // Получаем значение из поля подтверждения пароля
                const confirmPassword = document.getElementById('auth-confirm-password').value;

                try {
                    const response = await fetch('https://rps-arena-server.onrender.com/api/auth/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        // Теперь отправляем все четыре поля:
                        body: JSON.stringify({ email, password, playerName, confirmPassword }), // <-- Добавлен playerName и confirmPassword
                    });

                    const data = await response.json();
                    if (response.ok) {
                        this.setAuthToken(data.token); // Сохраняем токен
                        // НЕ вызываем DataManager.updateUserDataLocally(data.user) здесь, потому что DataManager может не быть готов
                        // Вместо этого, просто возвращаем данные
                        return { success: true, message: data.message, user: data.user, token: data.token };
                    } else {
                        return { success: false, message: data.error || 'Ошибка регистрации' };
                    }
                } catch (error) {
                    console.error('Ошибка регистрации:', error);
                    return { success: false, message: 'Ошибка подключения к серверу' };
                }
            }

            static async login(email, password) {
                try {
                    const response = await fetch('https://rps-arena-server.onrender.com/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ email, password }),
                    });

                    const data = await response.json();
                    if (response.ok) {
                        this.setAuthToken(data.token); // Сохраняем токен
                        // НЕ вызываем DataManager.updateUserDataLocally(data.user) здесь напрямую
                        // Вместо этого, просто возвращаем данные
                        return { success: true, message: data.message, user: data.user, token: data.token };
                    } else {
                        return { success: false, message: data.error || 'Ошибка входа' };
                    }
                } catch (error) {
                    console.error('Ошибка входа:', error);
                    return { success: false, message: 'Ошибка подключения к серверу' };
                }
            }

            static async logout() {
                const token = this.getAuthToken();
                if (token) {
                    try {
                        // Попробовать отправить запрос logout на сервер (если эндпоинт реализован)
                        await fetch('https://rps-arena-server.onrender.com/api/auth/logout', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                    } catch (error) {
                        console.warn('Logout request failed:', error);
                        // Даже если запрос не удался, всё равно удаляем токен
                    }
                }
                this.clearAuthToken();
                DataManager.clearLocalData(); // Очищаем локальные данные
                window.location.reload(); // Перезагружаем страницу, чтобы показать форму входа
            }
        }

        // ========== СИСТЕМА ХРАНЕНИЯ ДАННЫХ (ИСПРАВЛЕНО) ==========
        class DataManager {
            static initialize() {
                // Инициализация не требуется, так как данные приходят с сервера после аутентификации
                // Но можно выполнить базовую инициализацию localStorage, если нужно
                if (!localStorage.getItem('nftCollection')) localStorage.setItem('nftCollection', '[]');
                if (!localStorage.getItem('battleDeck')) localStorage.setItem('battleDeck', '[]');
                // ... другие инициализации ...
            }

            // Метод для ОБНОВЛЕНИЯ локальных данных ПОСЛЕ успешной аутентификации (регистрации или входа)
            static updateUserDataLocally(userData) {
                localStorage.setItem('userBalance', userData.balance.toString());
                localStorage.setItem('userLevel', userData.level.toString());
                localStorage.setItem('nftCollection', JSON.stringify(userData.inventory || [])); // Обеспечиваем массив
                localStorage.setItem('battleDeck', JSON.stringify(userData.deck || []));
                localStorage.setItem('playerStats', JSON.stringify({
                    totalWins: userData.stats?.totalWins || 0,
                    totalLosses: userData.stats?.totalLosses || 0,
                    currentStreak: userData.stats?.currentStreak || 0,
                    bestStreak: userData.stats?.bestStreak || 0,
                    totalBattles: userData.stats?.totalBattles || 0
                }));
                localStorage.setItem('achievements', JSON.stringify(userData.achievements || {}));
                localStorage.setItem('dailyQuests', JSON.stringify(userData.quests || []));
                // Обновляем имя игрока
                localStorage.setItem('playerName', userData.playerName || 'Игрок');
                // Обновляем интерфейс
                document.getElementById('user-balance').textContent = userData.balance;
                document.getElementById('user-level').textContent = userData.level;
                document.getElementById('profile-name').textContent = userData.playerName || 'Игрок';
            }

            static clearLocalData() {
                localStorage.removeItem('nftCollection');
                localStorage.removeItem('battleDeck');
                localStorage.removeItem('userBalance');
                localStorage.removeItem('userLevel');
                localStorage.removeItem('playerStats');
                localStorage.removeItem('achievements');
                localStorage.removeItem('dailyQuests');
                localStorage.removeItem('playerName'); // Очищаем имя игрока
            }

            // Метод для ЗАГРУЗКИ данных С СЕРВЕРА после аутентификации
            static async loadUserDataFromServer() {
                const token = AuthManager.getAuthToken(); // Проверяем токен из AuthManager
                if (!token) {
                    console.warn("Нет токена, невозможно загрузить данные с сервера.");
                    return;
                }

                try {
                    const response = await fetch('https://rps-arena-server.onrender.com/api/user/profile', {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const userData = await response.json();
                        this.updateUserDataLocally(userData); // Обновляем локальные данные из ответа сервера
                        // Перезагружаем компоненты, которые зависят от данных
                        if (typeof warehouse !== 'undefined') warehouse.renderCards();
                        if (typeof collectionManager !== 'undefined') collectionManager.renderCollection();
                        if (typeof profileManager !== 'undefined') profileManager.updateProfile();
                        if (typeof leaderboardManager !== 'undefined') leaderboardManager.renderLeaderboard();
                        if (typeof dailyQuestsManager !== 'undefined') dailyQuestsManager.renderQuests();
                    } else {
                        console.error('Ошибка загрузки профиля:', response.status);
                        // Токен может быть недействителен, разлогиниваем
                        AuthManager.logout();
                    }
                } catch (error) {
                    console.error('Ошибка загрузки профиля:', error);
                    // Опционально: разлогинить при сетевой ошибке
                    // AuthManager.logout();
                }
            }

            // --- Методы для работы с локальными данными ---
            static getCollection() {
                const collection = JSON.parse(localStorage.getItem('nftCollection') || '[]');
                return collection.map(cardData => {
                    return new NFTCard(
                        cardData.id,
                        cardData.name,
                        cardData.type,
                        cardData.element,
                        cardData.level,
                        cardData.price
                    );
                });
            }
            static addToCollection(card) {
                const collection = this.getCollection();
                if (!collection.find(c => c.id === card.id)) {
                    collection.push(card);
                    localStorage.setItem('nftCollection', JSON.stringify(collection));
                    // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                    // this.updateCollectionOnServer(collection);
                    return true;
                }
                return false;
            }
            static removeFromCollection(cardId) {
                const collection = this.getCollection();
                const newCollection = collection.filter(c => c.id !== cardId);
                localStorage.setItem('nftCollection', JSON.stringify(newCollection));
                this.removeFromBattleDeck(cardId);
                // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
            }
            static getBattleDeck() {
                const battleDeck = JSON.parse(localStorage.getItem('battleDeck') || '[]');
                return battleDeck.map(cardData => {
                    return new NFTCard(
                        cardData.id,
                        cardData.name,
                        cardData.type,
                        cardData.element,
                        cardData.level,
                        cardData.price
                    );
                });
            }
            static addToBattleDeck(card) {
                const battleDeck = this.getBattleDeck();
                if (battleDeck.length >= 5) {
                    return false;
                }
                if (!battleDeck.find(c => c.id === card.id)) {
                    battleDeck.push(card);
                    localStorage.setItem('battleDeck', JSON.stringify(battleDeck));
                    // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                    // this.updateBattleDeckOnServer(battleDeck);
                    return true;
                }
                return false;
            }
            static removeFromBattleDeck(cardId) {
                const battleDeck = this.getBattleDeck();
                const newDeck = battleDeck.filter(c => c.id !== cardId);
                localStorage.setItem('battleDeck', JSON.stringify(newDeck));
                // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
            }
            static getUserBalance() {
                return parseInt(localStorage.getItem('userBalance') || '0');
            }
            static updateUserBalance(newBalance) {
                localStorage.setItem('userBalance', newBalance.toString());
                document.getElementById('user-balance').textContent = newBalance;
                // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                // this.updateUserBalanceOnServer(newBalance);
            }
            static getUserLevel() {
                return parseInt(localStorage.getItem('userLevel') || '1');
            }
            static updateUserLevel(newLevel) {
                localStorage.setItem('userLevel', newLevel.toString());
                document.getElementById('user-level').textContent = newLevel;
                 // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                 // this.updateUserLevelOnServer(newLevel);
            }
            static getPlayerStats() {
                return JSON.parse(localStorage.getItem('playerStats') || '{"totalWins": 0, "totalLosses": 0, "currentStreak": 0, "bestStreak": 0, "totalBattles": 0}');
            }
            static updatePlayerStats(stats) {
                localStorage.setItem('playerStats', JSON.stringify(stats));
                // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                // this.updatePlayerStatsOnServer(stats);
            }
            static getAchievements() {
                return JSON.parse(localStorage.getItem('achievements') || '{}');
            }
            static updateAchievements(achievements) {
                localStorage.setItem('achievements', JSON.stringify(achievements));
                 // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                 // this.updateAchievementsOnServer(achievements);
            }
            static getDailyQuests() {
                return JSON.parse(localStorage.getItem('dailyQuests') || '{"quests": [], "lastClaimedDate": null}');
            }
            static updateDailyQuests(questsData) {
                localStorage.setItem('dailyQuests', JSON.stringify(questsData));
                 // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                 // this.updateDailyQuestsOnServer(questsData);
            }
            static getPlayerName() {
                return localStorage.getItem('playerName') || 'Игрок';
            }
        }

        // ========== СИСТЕМА КАРТОЧЕК ==========
        class NFTCard {
            constructor(id, name, type, element, level, price) {
                this.id = id;
                this.name = name;
                this.type = type;
                this.element = element;
                this.level = level;
                this.price = price;
            }
            getTypeEmoji() {
                const emojis = { 'rock': '🪨', 'scissors': '✂️', 'paper': '📄' };
                return emojis[this.type] || '❓';
            }
            getTypeName() {
                const names = { 'rock': 'Камень', 'scissors': 'Ножницы', 'paper': 'Бумага' };
                return names[this.type] || this.type;
            }
            getElementEmoji() {
                const emojis = { 'fire': '🔥', 'water': '💧', 'earth': '🌍', 'air': '💨' };
                return emojis[this.element] || '🌟';
            }
            getElementName() {
                const names = { 'fire': 'Огонь', 'water': 'Вода', 'earth': 'Земля', 'air': 'Воздух' };
                return names[this.element] || this.element;
            }
            isInCollection() {
                const collection = DataManager.getCollection();
                return collection.some(c => c.id === this.id);
            }
            isInBattleDeck() {
                const battleDeck = DataManager.getBattleDeck();
                return battleDeck.some(c => c.id === this.id);
            }
        }

        // ========== ГЕНЕРАТОР КАРТОЧЕК ==========
        class CardGenerator {
            static names = {
                rock: ['Гранитный воин', 'Базальтовый титан', 'Обсидиановый страж', 'Мраморный гигант', 'Лавовый защитник'],
                scissors: ['Стальные клинки', 'Бритвенные леза', 'Вихревые резаки', 'Металлические кусачки', 'Острые ножи'],
                paper: ['Свиток мудрости', 'Древний манускрипт', 'Магический пергамент', 'Бумажный ураган', 'Таинственный свиток']
            };
            static elements = ['fire', 'water', 'earth', 'air'];
            static generateCard(id) {
                const types = ['rock', 'scissors', 'paper'];
                const type = types[Math.floor(Math.random() * types.length)];
                const element = this.elements[Math.floor(Math.random() * this.elements.length)];
                const level = Math.floor(Math.random() * 3) + 1; // 1, 2, 3
                const name = this.names[type][Math.floor(Math.random() * this.names[type].length)];
                const price = 10 * level; // Цена зависит от уровня
                return new NFTCard(id, name, type, element, level, price);
            }
            static generateAllCards() {
                const cards = [];
                let id = 1;
                for (const type of ['rock', 'scissors', 'paper']) {
                    for (const element of this.elements) {
                        for (let level = 1; level <= 3; level++) {
                            const name = `${this.names[type][Math.floor(Math.random() * this.names[type].length)]} Lvl${level}`;
                            const price = 10 * level;
                            cards.push(new NFTCard(id++, name, type, element, level, price));
                        }
                    }
                }
                return cards;
            }
        }

        // ========== СИСТЕМА ФИЛЬТРОВ ==========
        class FilterSystem {
            constructor() {
                this.filters = {
                    type: 'all',
                    element: 'all',
                    level: 'all',
                    search: ''
                };
            }
            applyFilters(cards) {
                return cards.filter(card => {
                    if (this.filters.type !== 'all' && card.type !== this.filters.type) return false;
                    if (this.filters.element !== 'all' && card.element !== this.filters.element) return false;
                    if (this.filters.level !== 'all' && card.level != this.filters.level) return false;
                    if (this.filters.search) {
                        const searchTerm = this.filters.search.toLowerCase();
                        const cardText = card.name.toLowerCase();
                        if (!cardText.includes(searchTerm)) return false;
                    }
                    return true;
                });
            }
            updateFilter(type, value) {
                this.filters[type] = value;
            }
            resetFilters() {
                this.filters = {
                    type: 'all',
                    element: 'all',
                    level: 'all',
                    search: ''
                };
            }
        }

        // ========== СИСТЕМА ЕЖЕДНЕВНЫХ ЗАДАНИЙ ==========
        class DailyQuestsManager {
            constructor() {
                this.quests = [];
                this.init();
            }
            init() {
                this.generateDailyQuests();
            }
            generateDailyQuests() {
                const existingQuestsData = DataManager.getDailyQuests();
                const today = new Date().toDateString();
                if (existingQuestsData.lastClaimedDate === today) {
                    this.quests = existingQuestsData.quests;
                } else {
                     // Генерируем дефолтные задания, если нет
                     this.quests = [
                         { id: 'battle_1', title: 'Выиграть 1 бой', description: 'Сыграйте и выиграйте хотя бы один бой на арене', target: 1, current: 0, completed: false, rewards: [{ type: 'currency', amount: 50 }] },
                         { id: 'battle_3', title: 'Выиграть 3 боя', description: 'Выиграйте 3 боя в общей сложности', target: 3, current: 0, completed: false, rewards: [{ type: 'currency', amount: 150 }] },
                         { id: 'buy_card', title: 'Купить 1 карту', description: 'Покупите любую карту на складе', target: 1, current: 0, completed: false, rewards: [{ type: 'currency', amount: 75 }] }
                     ];
                     DataManager.updateDailyQuests({ quests: this.quests, lastClaimedDate: today });
                }
                this.renderQuests();
            }
            updateQuestProgress(questId, amount = 1) {
                const quest = this.quests.find(q => q.id === questId);
                if (quest && !quest.completed) {
                    quest.current = Math.min(quest.current + amount, quest.target);
                    if (quest.current >= quest.target) {
                        quest.completed = true;
                    }
                    DataManager.updateDailyQuests({ quests: this.quests, lastClaimedDate: new Date().toDateString() });
                    this.renderQuests();
                    // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                    // this.updateQuestProgressOnServer(questId, amount);
                }
            }
            claimReward(questId) {
                const quest = this.quests.find(q => q.id === questId);
                if (quest && quest.completed) {
                    let rewardMessage = `Получены награды за задание "${quest.title}":\n`;
                    quest.rewards.forEach(reward => {
                        if (reward.type === 'currency') {
                            DataManager.updateUserBalance(DataManager.getUserBalance() + reward.amount);
                            rewardMessage += `💰 ${reward.amount} TCR\n`;
                        } else if (reward.type === 'card') {
                            const newCard = CardGenerator.generateCard(Date.now());
                            // Сделаем карту с заданной редкостью
                            newCard.rarity = reward.rarity;
                            DataManager.addToCollection(newCard);
                            rewardMessage += `🃏 ${newCard.name} (${newCard.rarity} карта)\n`;
                        }
                    });
                    // Сбросим задание для следующего дня
                    quest.current = 0;
                    quest.completed = false;
                    DataManager.updateDailyQuests({ quests: this.quests, lastClaimedDate: new Date().toDateString() });
                    alert(rewardMessage);
                    this.renderQuests();
                    // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации с сервером !!!
                    // this.claimRewardOnServer(questId);
                }
            }
            renderQuests() {
                const container = document.getElementById('quests-grid');
                container.innerHTML = '';
                this.quests.forEach(quest => {
                    const questCard = document.createElement('div');
                    questCard.className = `quest-card ${quest.completed ? 'quest-completed' : ''}`;
                    questCard.innerHTML = `
                        <h3 class="quest-title">${quest.title}</h3>
                        <p class="quest-description">${quest.description}</p>
                        <div class="quest-rewards">
                            <strong>Награды:</strong>
                            ${quest.rewards.map(reward => `<div class="reward-item">${reward.type === 'currency' ? `💰 ${reward.amount} TCR` : `🃏 ${reward.rarity} карта`}</div>`).join('')}
                        </div>
                        <div class="quest-progress">
                            <div>Прогресс: ${quest.current} / ${quest.target}</div>
                            <div class="progress-bar-quest">
                                <div class="progress-fill-quest" style="width: ${(quest.current / quest.target) * 100}%"></div>
                            </div>
                        </div>
                        <button class="quest-btn" ${!quest.completed ? 'disabled' : ''} onclick="dailyQuestsManager.claimReward('${quest.id}')">
                            ${quest.completed ? 'Получить награду' : 'Задание активно'}

        // ========== СИСТЕМА БОЯ ==========
        class BattleManager {
            constructor() {
                this.playerScore = 0;
                this.aiScore = 0;
                this.round = 0;
                this.isBattleActive = false;
                this.playerDeck = [];
                this.aiDeck = [];
                this.currentPlayerCard = null;
                this.currentAICard = null;
                this.gameEnded = false;
                this.lastPlayerCardType = null;
                this.init();
            }
            init() {
                this.updateBattleDeck();
                this.setupEventListeners();
            }
            updateBattleDeck() {
                this.playerDeck = DataManager.getBattleDeck();
                this.renderBattleDeck();
            }
            renderBattleDeck() {
                const container = document.getElementById('battle-deck');
                container.innerHTML = '';
                this.playerDeck.forEach(card => {
                    const cardElement = this.createBattleCardElement(card);
                    container.appendChild(cardElement);
                });
                if (this.playerDeck.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #ff6b6b;">❌ Боевая колода пуста! Добавьте карты из коллекции.</div>';
                }
            }
            createBattleCardElement(card) {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'battle-card';
                cardDiv.innerHTML = `
                    <div class="card-type">${card.getTypeEmoji()} ${card.getTypeName()}</div>
                    <div class="card-element">${card.getElementEmoji()} ${card.getElementName()}</div>
                    <div class="card-level">⭐ ${card.level}</div>
                `;
                cardDiv.addEventListener('click', () => this.selectPlayerCard(card));
                return cardDiv;
            }
            selectPlayerCard(card) {
                if (!this.isBattleActive || this.currentPlayerCard) return;
                this.currentPlayerCard = card;
                this.lastPlayerCardType = card.type; // Запоминаем тип карты игрока
                this.renderPlayerCard(card);
                document.querySelectorAll('.battle-card').forEach(el => {
                    el.classList.add('disabled');
                });
                this.selectAICard();
                setTimeout(() => this.resolveRound(), 1000);
            }
            // ИНТЕЛЛЕКТУАЛЬНЫЙ АЛГОРИТМ ВЫБОРА КАРТЫ ИИ (БЕЗ ПОДСМОТРА)
            selectAICard() {
                // Используем колоду ИИ из DataManager
                this.aiDeck = DataManager.getAIDeck();
                if (!this.aiDeck || this.aiDeck.length === 0) {
                    // Если у ИИ нет колоды, генерируем её
                    this.generateRandomAIDeck();
                }
                // Определяем карту, которая обыгрывает последнюю карту игрока
                let counterCardType = null;
                if (this.lastPlayerCardType) {
                    if (this.lastPlayerCardType === 'rock') counterCardType = 'paper';
                    else if (this.lastPlayerCardType === 'scissors') counterCardType = 'rock';
                    else if (this.lastPlayerCardType === 'paper') counterCardType = 'scissors';
                }
                // Фильтруем колоду ИИ по подходящему типу
                const potentialCards = this.aiDeck.filter(card => card.type === counterCardType);
                // Если нашли подходящие карты, выбираем случайную из них
                if (potentialCards.length > 0) {
                    // С вероятностью 70% выбираем карту, обыгрывающую игрока
                    if (Math.random() < 0.7) {
                        this.currentAICard = potentialCards[Math.floor(Math.random() * potentialCards.length)];
                    } else {
                        // В 30% случаев - случайный выбор из всей колоды
                        this.currentAICard = this.aiDeck[Math.floor(Math.random() * this.aiDeck.length)];
                    }
                } else {
                    // Если подходящих карт нет, случайный выбор из всей колоды
                    this.currentAICard = this.aiDeck[Math.floor(Math.random() * this.aiDeck.length)];
                }
                this.renderAICard(this.currentAICard);
            }
            // ГЕНЕРАЦИЯ СЛУЧАЙНОЙ КОЛОДЫ ИИ
            generateRandomAIDeck() {
                const deckSize = 5; // Размер колоды ИИ
                this.aiDeck = [];
                for (let i = 0; i < deckSize; i++) {
                    const randomCard = CardGenerator.generateCard(2000 + i); // ID для ИИ-карт
                    // Повышаем уровень ИИ-карт для баланса
                    randomCard.level = Math.min(randomCard.level + Math.floor(Math.random() * 2), 3);
                    this.aiDeck.push(randomCard);
                }
                // Сохраняем колоду ИИ в DataManager
                DataManager.setAIDeck(this.aiDeck);
                console.log("Generated random AI deck:", this.aiDeck);
            }
            renderPlayerCard(card) {
                const container = document.getElementById('player-card-slot');
                container.innerHTML = `
                    <div class="battle-card">
                        <div class="card-type">${card.getTypeEmoji()} ${card.getTypeName()}</div>
                        <div class="card-element">${card.getElementEmoji()} ${card.getElementName()}</div>
                        <div class="card-level">⭐ ${card.level}</div>
                    </div>
                `;
            }
            renderAICard(card) {
                const container = document.getElementById('ai-card-slot');
                container.innerHTML = `
                    <div class="battle-card">
                        <div class="card-type">${card.getTypeEmoji()} ${card.getTypeName()}</div>
                        <div class="card-element">${card.getElementEmoji()} ${card.getElementName()}</div>
                        <div class="card-level">⭐ ${card.level}</div>
                    </div>
                `;
            }
            resolveRound() {
                if (!this.currentPlayerCard || !this.currentAICard) return;
                let rpsResult = this.determineRPSWinner(
                    this.currentPlayerCard.type, 
                    this.currentAICard.type
                );
                let roundWinner;
                if (rpsResult === 'player') {
                    roundWinner = 'player';
                    this.playerScore++;
                } else if (rpsResult === 'ai') {
                    roundWinner = 'ai';
                    this.aiScore++;
                } else {
                    roundWinner = 'draw';
                }
                document.getElementById('player-score').textContent = this.playerScore;
                document.getElementById('ai-score').textContent = this.aiScore;
                this.displayRoundResult(roundWinner);
                this.addRoundLog(roundWinner);
                if (this.playerScore >= 3 || this.aiScore >= 3) {
                    this.endGame();
                } else {
                    this.prepareNextRound();
                }
            }
            determineRPSWinner(playerType, aiType) {
                if (playerType === aiType) return 'draw';
                if (
                    (playerType === 'rock' && aiType === 'scissors') ||
                    (playerType === 'scissors' && aiType === 'paper') ||
                    (playerType === 'paper' && aiType === 'rock')
                ) {
                    return 'player';
                }
                return 'ai';
            }
            displayRoundResult(winner) {
                const resultMessage = document.getElementById('result-message');
                if (winner === 'player') {
                    resultMessage.textContent = 'Вы выиграли раунд!';
                    resultMessage.className = 'result-message win-message';
                } else if (winner === 'ai') {
                    resultMessage.textContent = 'ИИ выиграл раунд!';
                    resultMessage.className = 'result-message lose-message';
                } else {
                    resultMessage.textContent = 'Ничья в раунде!';
                    resultMessage.className = 'result-message';
                }
            }
            addRoundLog(winner) {
                let logMessage = `Раунд ${this.round + 1}: `;
                if (winner === 'player') {
                    logMessage += 'Вы выиграли!';
                    this.addLogEntry(logMessage, 'win');
                } else if (winner === 'ai') {
                    logMessage += 'ИИ выиграл!';
                    this.addLogEntry(logMessage, 'lose');
                } else {
                    logMessage += 'Ничья!';
                    this.addLogEntry(logMessage, 'draw');
                }
                this.addLogEntry(`Ваша карта: ${this.currentPlayerCard.name}, Карта ИИ: ${this.currentAICard.name}`, 'analysis');
            }
            prepareNextRound() {
                this.round++;
                this.currentPlayerCard = null;
                document.getElementById('player-card-slot').innerHTML = '<div class="card-placeholder">Выберите карту из колоды</div>';
                document.getElementById('ai-card-slot').innerHTML = '<div class="card-placeholder">ИИ выбирает...</div>';
                document.querySelectorAll('.battle-card').forEach(el => {
                    el.classList.remove('disabled');
                });
            }
            endGame() {
                this.gameEnded = true;
                this.isBattleActive = false;
                const resultMessage = document.getElementById('result-message');
                if (this.playerScore >= 3) {
                    resultMessage.textContent = '🎉 Вы выиграли игру!';
                    resultMessage.className = 'result-message win-message';
                    this.addLogEntry('Вы выиграли игру!', 'win');
                    // Награда за победу
                    const reward = 50;
                    DataManager.updateUserBalance(DataManager.getUserBalance() + reward);
                    this.addLogEntry(`Получена награда: ${reward} TCR`, 'win');
                    // Обновляем задания
                    dailyQuestsManager.updateQuestProgress('battle_1');
                    dailyQuestsManager.updateQuestProgress('battle_3');
                    leaderboardManager.updateStats(true);
                    // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации результата боя с сервером !!!
                } else {
                    resultMessage.textContent = '😔 ИИ выиграл игру!';
                    resultMessage.className = 'result-message lose-message';
                    this.addLogEntry('ИИ выиграл игру!', 'lose');
                    // Обновляем задания
                    dailyQuestsManager.updateQuestProgress('battle_1');
                    dailyQuestsManager.updateQuestProgress('battle_3');
                    leaderboardManager.updateStats(false);
                     // !!! ТУТ НУЖНО ВЫЗВАТЬ API для синхронизации результата боя с сервером !!!
                }
                document.querySelectorAll('.battle-card').forEach(el => {
                    el.classList.add('disabled');
                });
            }
            startBattle() {
                if (this.playerDeck.length === 0) {
                    alert('❌ Ваша боевая колода пуста! Добавьте карты из коллекции.');
                    return;
                }
                // Исправление: генерируем колоду ИИ, если она не установлена
                if (!this.aiDeck || this.aiDeck.length === 0) {
                    this.generateRandomAIDeck();
                }
                // Сбрасываем состояние игры
                this.playerScore = 0;
                this.aiScore = 0;
                this.round = 0;
                this.isBattleActive = true;
                this.gameEnded = false;
                this.currentPlayerCard = null;
                this.currentAICard = null;
                this.lastPlayerCardType = null; // Сбрасываем последнюю карту игрока
                document.getElementById('player-score').textContent = this.playerScore;
                document.getElementById('ai-score').textContent = this.aiScore;
                document.getElementById('player-card-slot').innerHTML = '<div class="card-placeholder">Выберите карту из колоды</div>';
                document.getElementById('ai-card-slot').innerHTML = '<div class="card-placeholder">ИИ выбирает...</div>';
                document.getElementById('result-message').textContent = '';
                document.querySelectorAll('.battle-card').forEach(el => {
                    el.classList.remove('disabled');
                });
                document.getElementById('battle-log').innerHTML = '<div class="log-entry">Бой начат! Выберите карту.</div>';
            }
            restartBattle() {
                this.startBattle();
            }
            addLogEntry(message, type = '') {
                const logContainer = document.getElementById('battle-log');
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${type}`;
                logEntry.textContent = message;
                logContainer.appendChild(logEntry);
                logContainer.scrollTop = logContainer.scrollHeight;
            }
            setupEventListeners() {
                document.getElementById('start-battle').addEventListener('click', () => {
                    this.startBattle();
                });
                document.getElementById('restart-battle').addEventListener('click', () => {
                    this.restartBattle();
                });
            }
        }

                let updated = false;
                // Проверка достижений

                    achievements.firstWin = true;
                    updated = true;
                    this.showAchievementNotification('Первая победа', '🏆');

                if (!achievements.firstLoss && stats.totalLosses >= 1) {
                    achievements.firstLoss = true;
                    updated = true;
                    this.showAchievementNotification('Первое поражение', '💔');

                    this.showAchievementNotification('Новичок', '😭');

            const authEmailInput = document.getElementById('auth-email');
            const authPasswordInput = document.getElementById('auth-password');
            const authConfirmPasswordInput = document.getElementById('auth-confirm-password');
            const authPlayerNameInput = document.getElementById('auth-player-name');
            const authMessage = document.getElementById('auth-message');
            const authSuccessMessage = document.getElementById('auth-success-message');

            let isLoginMode = true;

            // Проверяем, авторизован ли пользователь
            if (AuthManager.isLoggedIn()) {
                authModal.style.display = 'none';
                // Здесь можно показать основной интерфейс игры
                document.body.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h1>Добро пожаловать!</h1>
                        <p>Вы вошли в игру.</p>
                        <button id="logout-btn" style="padding: 10px 20px; background: #ff6b6b; border: none; border-radius: 5px; cursor: pointer;">Выйти</button>
                    </div>
                `;
                document.getElementById('logout-btn').addEventListener('click', () => {
                    AuthManager.logout();
                });
                DataManager.loadUserDataFromServer(); // Загружаем данные с сервера
                // Инициализируем менеджеры (если нужно использовать в других частях приложения)
                window.collectionManager = new CollectionManager();
                window.battleManager = new BattleManager();
                window.dailyQuestsManager = new DailyQuestsManager();
                window.profileManager = new ProfileManager();
                window.leaderboardManager = new LeaderboardManager();
            } else {
                authModal.style.display = 'flex';
            }

            // Обработчик переключения между формами
            authToggle.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                if (isLoginMode) {
                    authTitle.textContent = 'Вход';
                    authSubmitBtn.textContent = 'Войти';
                    authConfirmPasswordInput.style.display = 'none';
                    authPlayerNameInput.style.display = 'none';
                } else {
                    authTitle.textContent = 'Регистрация';
                    authSubmitBtn.textContent = 'Зарегистрироваться';
                    authConfirmPasswordInput.style.display = 'block';
                    authPlayerNameInput.style.display = 'block';
                }
                authMessage.textContent = '';
                authSuccessMessage.textContent = '';
            });

            // Обработчик отправки формы
            authForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                authMessage.textContent = '';
                authSuccessMessage.textContent = '';

                const email = authEmailInput.value.trim();
                const password = authPasswordInput.value;
                const confirmPassword = authConfirmPasswordInput.value;
                const playerName = authPlayerNameInput.value.trim(); // Получаем имя игрока

                if (!isLoginMode && password !== confirmPassword) {
                    authMessage.textContent = 'Пароли не совпадают';
                    return;
                }

                if (!isLoginMode && !playerName) {
                    authMessage.textContent = 'Введите имя игрока';
                    return;
                }

                let result;
                if (isLoginMode) {
                    result = await AuthManager.login(email, password);
                } else {
                    result = await AuthManager.register(email, password, playerName);
                }

                if (result.success) {
                    // --- КЛЮЧЕВОЕ ИЗМЕНЕНИЕ ---
                    // После успешной аутентификации обновляем локальные данные
                    DataManager.updateUserDataLocally(result.user); // <-- Вызываем updateUserDataLocally с полученными от сервера данными

                    authSuccessMessage.textContent = result.message;
                    setTimeout(() => {
                        authModal.style.display = 'none';
                        // Здесь можно показать основной интерфейс игры
                        document.body.innerHTML = `
                            <div style="text-align: center; padding: 50px;">
                                <h1>Добро пожаловать!</h1>
                                <p>Вы успешно вошли в игру.</p>
                                <button id="logout-btn" style="padding: 10px 20px; background: #ff6b6b; border: none; border-radius: 5px; cursor: pointer;">Выйти</button>
                            </div>
                        `;
                        document.getElementById('logout-btn').addEventListener('click', () => {
                            AuthManager.logout();
                        });
                        // Загружаем данные с сервера (это обновит интерфейс и синхронизирует локальное состояние)
                        DataManager.loadUserDataFromServer();
                        // Инициализируем менеджеры
                        window.collectionManager = new CollectionManager();
                        window.battleManager = new BattleManager();
                        window.dailyQuestsManager = new DailyQuestsManager();
                        window.profileManager = new ProfileManager();
                        window.leaderboardManager = new LeaderboardManager();
                    }, 1500);
                } else {
                    authMessage.textContent = result.message;
                }
            });
        });
    </script>
</body>
</html>
